<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IronCore</title>
  <link rel="icon" type="image/svg+xml" href="gym_logo.svg" />
  <link rel="shortcut icon" href="gym_logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="brand">
      <img src="gym_logo.svg" alt="IronCore Logo" class="nav-logo" />
      <span>IronCore</span>
    </div>
    <ul>
      <li><a href="#home">Home</a></li>
      <li><a href="#plans">Plans</a></li>
      <li><a href="#account">Account</a></li>
    </ul>
  </nav>

  <!-- HOME -->
  <section id="home">

    <!-- Hero -->
    <div class="bar">
      
      <h1>Push Past Your Limits</h1>
      <p>Become the version of yourself defined by <em>your effort</em>.</p>
      <a href="#plans">View Plans</a>
      <a href="#account">My Account</a>
    </div>

    <div class="container"><img src="gym.png" alt="Bodybuilder posing" class="gym_image"/></div>

    <!-- Stats -->
    <div>
      <div>
        <strong>12K+</strong>
        <p>Active Members</p>
      </div>
      <div>
        <strong>48+</strong>
        <p>Expert Coaches</p>
      </div>
      <div>
        <strong>3+</strong>
        <p>Locations</p>
      </div>
      <div>
        <strong>98%</strong>
        <p>Satisfaction Rate</p>
      </div>
    </div>

  </section>

</body>
</html>
